name: Daily Chain

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    uses: ./.github/workflows/generate-and-deploy.yml
    permissions:
      contents: write
      pages: write
      id-token: write

  submit:
    needs: generate
    uses: ./.github/workflows/submit-batch.yml
    permissions:
      contents: write
    secrets: inherit
